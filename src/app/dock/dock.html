<div class="dock" (mousemove)="onDockMouseMove($event)" (mouseleave)="onDockMouseLeave()">
  <div class="dock-items">
    @for (app of apps(); track app.id; let i = $index) {
      <button
        class="dock-icon"
        [style.transform]="'scale(' + iconScales()[i] + ')'"
        [style.transform-origin]="'bottom center'"
        [attr.aria-label]="app.label"
        (click)="onIconClick(app)"
      >
        <div class="dock-icon-tile" [style.background]="app.color">
          <span class="dock-icon-emoji">{{ app.icon }}</span>
        </div>
        <span class="dock-icon-label">{{ app.label }}</span>
        @if (getIndicator(app.id); as indicator) {
          <span
            class="dock-indicator"
            [class.dock-indicator-active]="indicator === 'active'"
          ></span>
        }
      </button>
    }
  </div>

  @if (transientApps().length > 0) {
    <div class="dock-separator"></div>

    <div class="dock-items dock-recent">
      @for (app of transientApps(); track app.id) {
        <button class="dock-icon" [attr.aria-label]="app.label" (click)="onIconClick(app)">
          <div class="dock-icon-tile" [style.background]="app.color">
            <span class="dock-icon-emoji">{{ app.icon }}</span>
          </div>
          <span class="dock-icon-label">{{ app.label }}</span>
          @if (getIndicator(app.id); as indicator) {
            <span
              class="dock-indicator"
              [class.dock-indicator-active]="indicator === 'active'"
            ></span>
          }
        </button>
      }
    </div>
  }
</div>
