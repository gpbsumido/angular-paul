<div
  class="window"
  [class.active]="isActive()"
  [style.width.px]="width()"
  [style.height.px]="height()"
  [style.left.px]="x()"
  [style.top.px]="y()"
>
  <div class="window-titlebar">
    <div class="traffic-lights">
      <button class="traffic-light traffic-close" aria-label="Close" (click)="closed.emit()">
        <span class="traffic-symbol">✕</span>
      </button>
      <button
        class="traffic-light traffic-minimize"
        aria-label="Minimize"
        (click)="minimized.emit()"
      >
        <span class="traffic-symbol">−</span>
      </button>
      <button
        class="traffic-light traffic-maximize"
        aria-label="Maximize"
        (click)="maximized.emit()"
      >
        <span class="traffic-symbol">⤢</span>
      </button>
    </div>

    <span class="window-title">{{ title() }}</span>

    <div class="window-titlebar-right">
      <button class="window-thoughts-btn" aria-label="Thoughts">ⓘ</button>
    </div>
  </div>

  <div class="window-body">
    <ng-content />
  </div>
</div>
